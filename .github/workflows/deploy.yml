name: Deploy on Comment

# SECURITY ARCHITECTURE:
# This workflow uses issue_comment trigger which ALWAYS runs from the default branch (main).
# This prevents attackers from modifying the workflow in feature branches to bypass security checks.
# Even if a malicious PR contains a modified .github/workflows/deploy.yml, GitHub will ignore it
# and execute the version from the default branch only.
#
# Reference: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#issue_comment
on:
  issue_comment:
    types: [created]

# Explicit permissions following principle of least privilege
# This workflow can only read code/PRs and write comments - cannot push code or modify settings
permissions:
  contents: read        # Read repository contents for checkout
  pull-requests: write  # Required to read PR metadata in issue_comment context
  issues: write         # Post deployment status comments
  deployments: write    # Create GitHub Deployments via API for correct ref tracking
  checks: read          # Read check runs for coverage gate

# Environment variables (workflow-level)
# VM configuration sourced from repository variables for centralized management
# See .github/PHASE1-SETUP.md for setup instructions
env:
  VM_HOST: ${{ vars.VM_HOST }}
  VM_USER: ${{ vars.VM_USER }}
  VM_APP_PATH: ${{ vars.VM_APP_PATH }}
  VM_SERVICE_NAME: ${{ vars.VM_SERVICE_NAME }}
  AUTHORIZED_STAGING_USERS: ${{ vars.AUTHORIZED_STAGING_USERS }}
  AUTHORIZED_PRODUCTION_USERS: ${{ vars.AUTHORIZED_PRODUCTION_USERS }}

# Concurrency control: Only ONE deployment at a time across all environments
# Cancel any in-progress deployment when a new one is triggered
# Prevents race conditions and ensures clean deployment state
concurrency:
  group: deployment
  cancel-in-progress: true

jobs:
  # JOB 1: VALIDATION - Runs FIRST without environment protection
  # Checks authorization, PR state, and coverage BEFORE asking for approval
  # This prevents wasting reviewer time on deployments that will fail validation
  validate:
    # Security: Only run on pull request comments (not regular issues)
    if: github.event.issue.pull_request != null
    runs-on: self-hosted
    timeout-minutes: 5

    # Outputs for the deploy job
    outputs:
      should_deploy: ${{ steps.validate.outputs.should_deploy }}
      environment: ${{ steps.validate.outputs.environment }}
      pr_sha: ${{ steps.validate.outputs.pr_sha }}
      pr_number: ${{ steps.validate.outputs.pr_number }}
      pr_branch: ${{ steps.validate.outputs.pr_branch }}

    steps:
      # STEP 0: Checkout repository for composite actions
      # GitHub Actions best practice: Check out repository at the start of the job
      # This ensures all composite actions under .github/actions/ are available throughout the workflow
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # STEP 1: Validate deployment trigger and perform all security checks
      - name: Validate deployment trigger and permissions
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const validCommands = ['[staging]', '[prod]'];

            // STRICT COMMAND MATCHING: Only exact "[staging]" or "[prod]" triggers deployment
            // Prevents typos, variations, or injection attempts from triggering deployments
            if (!validCommands.includes(comment)) {
              const errorMsg = `Invalid command: "${comment}". Only exact [staging] or [prod] commands are allowed.`;
              core.setOutput('error_message', errorMsg);
              core.info('Comment does not match deployment triggers: [staging] or [prod]');
              return { shouldDeploy: false };
            }

            // Determine target environment
            const environment = comment === '[staging]' ? 'staging' : 'production';
            core.info(`Deployment requested for: ${environment}`);

            // SECURITY CHECK 1: Verify commenter is authorized for the target environment
            // Different users can deploy to different environments
            const commenter = context.payload.comment.user.login;

            // Define authorized users per environment from repository variables
            // This allows managing deployment permissions without modifying workflow code
            const stagingAuthorizedUsers = process.env.AUTHORIZED_STAGING_USERS
              .split(',')
              .map(u => u.trim());

            const productionAuthorizedUsers = process.env.AUTHORIZED_PRODUCTION_USERS
              .split(',')
              .map(u => u.trim());

            // Check authorization based on target environment
            const authorizedUsers = environment === 'staging'
              ? stagingAuthorizedUsers
              : productionAuthorizedUsers;

            if (!authorizedUsers.includes(commenter)) {
              const allowedList = authorizedUsers.join(', ');
              const errorMsg = `❌ AUTHORIZATION FAILED: User "${commenter}" is not authorized to deploy to ${environment}. Authorized users: ${allowedList}`;
              core.setOutput('error_message', errorMsg);
              core.setFailed(errorMsg);
              return { shouldDeploy: false };
            }
            core.info(`✅ Authorization check passed: ${commenter} is authorized for ${environment} deployment`);

            // Get PR details with retry logic for GitHub async mergeability calculation
            let pr;
            const maxRetries = 10;
            const retryDelay = 5000;

            for (let attempt = 0; attempt < maxRetries; attempt++) {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number
              });

              pr = prData;

              core.info(
                `🔍 Attempt ${attempt + 1}/${maxRetries}: mergeable=${pr.mergeable}, mergeable_state="${pr.mergeable_state}"`
              );

              // Stop polling when GitHub finishes computing mergeability
              if (pr.mergeable !== null && pr.mergeable_state !== "unknown") {
                core.info(
                  `✅ Mergeability resolved: mergeable=${pr.mergeable}, state="${pr.mergeable_state}"`
                );
                break;
              }

              if (attempt < maxRetries - 1) {
                core.info(`⏳ GitHub still computing mergeability. Retrying in ${retryDelay / 1000}s...`);
                await new Promise(resolve => setTimeout(resolve, retryDelay));
              }
            }

            // SECURITY CHECK 2: Verify PR is OPEN
            // Prevents deployment of closed or merged PRs
            if (pr.state !== 'open') {
              const errorMsg = `❌ VALIDATION FAILED: PR #${context.issue.number} is not open (state: ${pr.state})`;
              core.setOutput('error_message', errorMsg);
              core.setFailed(errorMsg);
              return { shouldDeploy: false };
            }
            core.info(`✅ PR state check passed: PR is open`);

            // SECURITY CHECK 3: Verify PR is mergeable and state is "clean"
            // Prevents deployment if PR has conflicts, is blocked, behind, or failing checks
            // mergeable=true: No merge conflicts
            // mergeable_state="clean": All required checks passed, no conflicts, ready to merge
            if (pr.mergeable !== true || pr.mergeable_state !== "clean") {
              // Check if the issue is a failing test-coverage check for better error message
              const prSha = pr.head.sha;
              let coverageErrorMsg = null;

              try {
                const { data: allChecks } = await github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: prSha
                });

                const coverageCheck = allChecks.check_runs.find(check => check.name === 'test-coverage');

                if (coverageCheck && coverageCheck.conclusion === 'failure') {
                  // Extract coverage percentage from check title
                  let coveragePct = 'N/A';
                  if (coverageCheck.output && coverageCheck.output.title) {
                    const match = coverageCheck.output.title.match(/Coverage\s+([\d.]+)%/);
                    if (match) {
                      coveragePct = match[1];
                    }
                  }

                  coverageErrorMsg = `❌ DEPLOYMENT BLOCKED: Coverage Gate Failed\n\n` +
                    `**Coverage:** ${coveragePct}% (threshold: 70%)\n` +
                    `**Status:** Test coverage check failed\n\n` +
                    `---\n\n` +
                    `#### 📊 Coverage Requirements\n\n` +
                    `Deployments require:\n` +
                    `- ✅ Coverage must be ≥70%\n` +
                    `- ✅ All tests must pass\n` +
                    `- ✅ Check "test-coverage" must complete with success\n\n` +
                    `#### 🔧 How to Fix\n\n` +
                    `1. Add tests to increase coverage to ≥70%\n` +
                    `2. Ensure all existing tests pass\n` +
                    `3. Push changes to trigger new coverage check\n` +
                    `4. Wait for "test-coverage" check to pass\n` +
                    `5. Retry deployment\n\n` +
                    `**Check run:** ${coverageCheck.html_url}`;
                }
              } catch (error) {
                core.info(`Could not check coverage status: ${error.message}`);
              }

              const errorMsg = coverageErrorMsg ||
                `❌ VALIDATION FAILED: PR #${context.issue.number} mergeable=${pr.mergeable}, state="${pr.mergeable_state}". Required: mergeable=true and state="clean".`;

              core.setOutput('error_message', errorMsg);
              core.setFailed(errorMsg);
              return { shouldDeploy: false };
            }
            core.info(`✅ Mergeability check passed: mergeable=${pr.mergeable}, state="${pr.mergeable_state}"`);

            // SHA-BASED DEPLOYMENT SECURITY:
            // Extract exact commit SHA from PR HEAD and deploy ONLY that specific commit.
            // This prevents "hitchhiker commits" - a security issue where an attacker pushes
            // additional malicious commits to the PR branch after approval but before deployment.
            //
            // Attack scenario prevented:
            // 1. Attacker creates PR with commit A (looks safe)
            // 2. Owner reviews and approves commit A
            // 3. Attacker pushes commit B (malicious) to same branch
            // 4. Owner triggers deployment thinking they're deploying commit A
            // 5. If deploying by branch name, commit B would be deployed (security breach)
            // 6. With SHA-based deployment, only commit A is deployed (secure)
            //
            // By deploying the exact SHA that exists at comment time, we ensure the deployed
            // code matches what was reviewed, even if the branch is updated afterwards.
            const prSha = pr.head.sha;
            core.info(`📍 Target commit SHA: ${prSha}`);

            // Set outputs for subsequent steps
            core.setOutput('should_deploy', 'true');
            core.setOutput('environment', environment);
            core.setOutput('pr_sha', prSha);
            core.setOutput('pr_number', context.issue.number);
            core.setOutput('pr_branch', pr.head.ref);

            core.info(`✅ All validation checks passed. Proceeding with ${environment} deployment.`);

            return {
              shouldDeploy: true,
              environment: environment,
              prSha: prSha,
              prNumber: context.issue.number
            };


      # STEP 1.6: Verify Coverage Gate Passed
      # COVERAGE GATE: Block deployment if coverage check missing or failed
      # Queries GitHub Checks API for "test-coverage" check run (job name) on the PR SHA
      # Deployment proceeds only if coverage check exists with conclusion=success
      - name: Verify Coverage Gate
        id: verify_coverage
        if: steps.validate.outputs.should_deploy == 'true'
        uses: ./.github/actions/verify-coverage-gate
        with:
          target-sha: ${{ steps.validate.outputs.pr_sha }}
          action-type: 'deployment'
          github-token: ${{ github.token }}

      # STEP 1.7: Post coverage gate failure message
      # Runs if coverage gate check failed
      # Provides immediate feedback in PR about coverage requirements
      - name: Post Coverage Gate Failure
        if: always() && steps.verify_coverage.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const errorMessage = '${{ steps.verify_coverage.outputs.error_message }}';
            const targetSha = '${{ steps.verify_coverage.outputs.target_sha }}';
            const checkUrl = '${{ steps.verify_coverage.outputs.check_url }}';
            const coveragePct = '${{ steps.verify_coverage.outputs.coverage_pct }}' || 'N/A';

            let coverageInfo = '';
            if (coveragePct !== 'N/A') {
              coverageInfo = `\n**Current coverage:** ${coveragePct}% (threshold: 70%)\n`;
            }

            const comment = `### ❌ Deployment Blocked - Coverage Gate Failed

            **Error Details:**

            ${errorMessage || '❌ Coverage gate check failed - see workflow logs'}
            ${coverageInfo}
            ---

            #### 📊 Coverage Requirements

            Deployments require:
            - ✅ Coverage tests must run on target SHA: \`${targetSha.substring(0, 7)}\`
            - ✅ Coverage must be ≥70%
            - ✅ All tests must pass
            - ✅ Check "test-coverage" must complete with success

            #### 🔧 How to Fix

            1. Push changes to your branch to trigger coverage tests
            2. Verify tests pass with ≥70% coverage
            3. Wait for "test-coverage" check to complete successfully
            4. Retry deployment with \`[staging]\` or \`[prod]\`

            ${checkUrl ? `**Check run:** ${checkUrl}` : ''}

            ---
            📋 **View Deployment Workflow:** [Run #${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

      # STEP 2: Post validation failure message
      # Runs if validation step completed but deployment was rejected
      # Provides immediate feedback in PR without checking Actions tab
      # Displays the EXACT error message from validation
      - name: Post Validation Failure
        if: always() && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const errorMessage = ${{ toJSON(steps.validate.outputs.error_message) }};

            const comment = `### ❌ Deployment Rejected

            **Error Details:**

            ${errorMessage || '❌ Validation failed - check workflow logs for details'}

            ---
            📋 **View Full Logs:** [Workflow Run #${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });

  # JOB 2: DEPLOYMENT - Runs AFTER validation passes
  # This job has environment protection (approval for production)
  # Approval is only requested AFTER authorization checks pass
  deploy:
    needs: validate
    if: needs.validate.outputs.should_deploy == 'true'
    runs-on: self-hosted

    # Environment-based deployment protection
    # Production deployments require manual approval from designated reviewers
    # Staging deployments proceed automatically after validation
    # NOTE: This approval happens AFTER authorization checks in validate job
    environment:
      name: ${{ needs.validate.outputs.environment }}
      url: ${{ format('http://{0}/{1}', vars.VM_HOST, needs.validate.outputs.environment) }}

    # Prevent runaway deployments - fail if job exceeds 15 minutes
    # Note: For production, this timeout includes time waiting for manual approval
    timeout-minutes: 15

    steps:
      # STEP 0: Checkout repository for composite actions
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # STEP 1: Create GitHub Deployment via API
      # Creates a deployment record tied to the PR head SHA (not main)
      # This gives correct visibility in GitHub Deployments/Environments UI
      - name: Create GitHub Deployment
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ needs.validate.outputs.environment }}';
            const prSha = '${{ needs.validate.outputs.pr_sha }}';
            const prBranch = '${{ needs.validate.outputs.pr_branch }}';
            const prNumber = '${{ needs.validate.outputs.pr_number }}';

            core.info(`📝 Creating deployment record for ${environment}`);
            core.info(`   Ref (SHA): ${prSha}`);
            core.info(`   Branch: ${prBranch}`);
            core.info(`   PR: #${prNumber}`);

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: prSha,
              task: `${prBranch}:deploy`,  // Shows branch + action in UI (e.g., "feature_1:deploy")
              environment,
              auto_merge: false,
              description: `Deploy PR #${prNumber} (${prBranch}) to ${environment} via comment trigger`,
              payload: {
                pr_number: prNumber,
                pr_branch: prBranch,
                pr_sha: prSha,
                triggered_by: context.payload.comment.user.login,
                comment_id: context.payload.comment.id
              }
            });

            core.setOutput('deployment_id', deployment.id);
            core.info(`Deployment created: ID ${deployment.id}`);

            // Mark as in-progress for better visibility
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'in_progress',
              environment,
              description: `Deployment started for ${environment}`,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      # STEP 2: Checkout exact commit SHA from PR HEAD
      # SECURITY: Always checkout by exact SHA, NEVER by branch name
      # NEVER use git pull - always checkout specific commit
      # This ensures we deploy exactly what was validated, not what's currently on the branch
      - name: Checkout PR HEAD commit (exact SHA)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.pr_sha }}
          fetch-depth: 1

      # STEP 3: Capture Build Metadata
      # Record deployment metadata for tracking and observability
      - name: Capture Build Metadata
        id: build_metadata
        run: |
          set -euo pipefail

          # Capture build timestamp in ISO 8601 format
          BUILD_TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "build_timestamp=${BUILD_TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "📅 Build Timestamp: ${BUILD_TIMESTAMP}"

          # Deployment ID is the GitHub run ID
          echo "deployment_id=${{ github.run_id }}" >> $GITHUB_OUTPUT
          echo "🆔 Deployment ID: ${{ github.run_id }}"

          # Full 40-character commit SHA (already provided by validation step)
          echo "✅ Full Commit SHA: ${{ needs.validate.outputs.pr_sha }}"

      # STEP 4: Setup SSH Key for VM Access
      # Configure SSH authentication to connect to the VM
      # SECURITY: SSH private key stored as GitHub secret
      - name: Setup SSH Key for VM Access
        uses: ./.github/actions/setup-ssh
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          vm-host: ${{ env.VM_HOST }}
          vm-user: ${{ env.VM_USER }}

      # STEP 5: Check if same version is already deployed
      # Skip deployment if the exact same SHA is already deployed on VM
      # Prevents unnecessary downtime and service restarts
      - name: Check Already Deployed
        id: check_deployed
        env:
          COMMIT_SHA: ${{ needs.validate.outputs.pr_sha }}
          ENVIRONMENT: ${{ needs.validate.outputs.environment }}
        run: |
          set -euo pipefail

          echo "🔍 Checking current deployment on VM..."

          # SSH into VM and check currently deployed SHA
          CURRENT_SHA=$(ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 ${VM_USER}@${VM_HOST} \
            "git -C ${VM_APP_PATH} rev-parse HEAD 2>/dev/null || echo unknown" 2>/dev/null || echo "unknown")

          echo "📍 Current SHA: ${CURRENT_SHA}"
          echo "📍 Target SHA:  ${COMMIT_SHA}"

          if [ "$CURRENT_SHA" = "$COMMIT_SHA" ]; then
            echo "already_deployed=true" >> $GITHUB_OUTPUT
            echo "✅ Same version already deployed: ${COMMIT_SHA}"
            echo "⏭️  Skipping deployment (no changes)"
          else
            echo "already_deployed=false" >> $GITHUB_OUTPUT
            echo "🔄 Different version detected - proceeding with deployment"
          fi

      # STEP 6: Post redeployment notification (when same SHA is already deployed)
      # Informs user that same version will be redeployed with service restart
      - name: Post Redeployment Notice
        if: steps.check_deployed.outputs.already_deployed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ needs.validate.outputs.environment }}';
            const sha = '${{ needs.validate.outputs.pr_sha }}';
            const prNumber = '${{ needs.validate.outputs.pr_number }}';
            const buildTimestamp = '${{ steps.build_metadata.outputs.build_timestamp }}';
            const deploymentId = '${{ steps.build_metadata.outputs.deployment_id }}';
            const vmHost = process.env.VM_HOST;
            const vmAppPath = process.env.VM_APP_PATH;

            const comment = `### 🔄 Redeploying Same Version

            #### 📋 Deployment Info
            | Field | Value |
            |-------|-------|
            | **Environment** | \`${environment}\` |
            | **Status** | Redeploying + Restarting Service |
            | **Commit SHA** | \`${sha}\` |
            | **Timestamp** | \`${buildTimestamp}\` |
            | **Deployment ID** | \`${deploymentId}\` |
            | **VM Host** | \`${vmHost}\` |
            | **App Path** | \`${vmAppPath}\` |

            ---
            ℹ️ Same commit SHA detected on VM, but proceeding with full deployment to ensure service is restarted with latest code.

            #### 🌐 Access Information
            **VM:** ${vmHost}
            **Workflow Run:** [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ⚙️ **Action:** Redeploying and restarting \`${process.env.VM_SERVICE_NAME}\` service.
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

      # STEP 7: Deploy to Staging Environment
      # SSH into VM, checkout validated commit SHA, and restart service
      # SECURITY: Deployment uses exact validated SHA - never branch names
      # Using centralized deploy-to-vm composite action
      - name: Deploy to Staging
        id: deploy_staging
        if: needs.validate.outputs.environment == 'staging'
        uses: ./.github/actions/deploy-to-vm
        with:
          commit-sha: ${{ needs.validate.outputs.pr_sha }}
          environment: staging
          vm-host: ${{ vars.VM_HOST }}
          vm-user: ${{ vars.VM_USER }}
          vm-app-path: ${{ vars.VM_APP_PATH }}
          vm-service-name: ${{ vars.VM_SERVICE_NAME }}
          app-port: ${{ vars.APP_PORT }}
          api-key: ${{ secrets.API_KEY }}
          db-host: ${{ secrets.DB_HOST }}
          deployment-id: ${{ github.run_id }}

      # STEP 8: Verify Staging Deployment (Production Pre-Check)
      # PRODUCTION DEPLOYMENT POLICY:
      # Production deployments should only proceed after the same SHA has been tested in staging.
      # This ensures:
      #
      # 1. CONSISTENCY: What is tested in staging is what gets deployed to production
      # 2. SECURITY: Untested code doesn't reach production
      # 3. COMPLIANCE: Production deployments follow proper testing workflow
      # 4. RELIABILITY: "What you test is what you deploy"
      #
      # This step verifies that staging was deployed first, enforcing the staging-first workflow.
      - name: Verify Staging Deployment
        if: needs.validate.outputs.environment == 'production' && steps.check_deployed.outputs.already_deployed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = '${{ needs.validate.outputs.pr_sha }}';

            core.info(`🔍 Verifying staging deployment for SHA: ${targetSha}`);
            core.info(`   Querying GitHub Deployments API for staging environment...`);

            // Query all deployments for staging environment
            const { data: deployments } = await github.rest.repos.listDeployments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              environment: 'staging',
              sha: targetSha,
              per_page: 100
            });

            core.info(`   Found ${deployments.length} staging deployment(s) for SHA ${targetSha.substring(0, 7)}`);

            if (deployments.length === 0) {
              const errorMsg = `❌ STAGING VERIFICATION FAILED: No staging deployment found for SHA ${targetSha.substring(0, 7)}\n\n` +
                `**Production Deployment Policy:**\n` +
                `This SHA must be deployed to staging first before production deployment.\n\n` +
                `**Required Action:**\n` +
                `1. Deploy this SHA to staging first with: [staging]\n` +
                `2. Verify staging deployment is successful\n` +
                `3. Then deploy to production with: [prod]\n\n` +
                `This ensures what is tested in staging is what gets deployed to production.`;
              core.setFailed(errorMsg);
              throw new Error(errorMsg);
            }

            // Get deployment statuses for each deployment and check for success
            let hasSuccessfulDeployment = false;

            for (const deployment of deployments) {
              const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.id,
                per_page: 100
              });

              // Sort by created_at descending to get most recent status first
              const sortedStatuses = statuses.sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
              );

              if (sortedStatuses.length > 0 && sortedStatuses[0].state === 'success') {
                hasSuccessfulDeployment = true;
                core.info(`✅ Found successful staging deployment: ID ${deployment.id}`);
                core.info(`   Status: ${sortedStatuses[0].state}`);
                core.info(`   Created: ${sortedStatuses[0].created_at}`);
                break;
              }
            }

            if (!hasSuccessfulDeployment) {
              const errorMsg = `❌ STAGING VERIFICATION FAILED: SHA ${targetSha.substring(0, 7)} found in staging but no successful deployment\n\n` +
                `**Status:** Staging deployment exists but did not complete successfully\n\n` +
                `**Required Action:**\n` +
                `1. Check staging deployment logs for errors\n` +
                `2. Fix any issues and redeploy to staging\n` +
                `3. Verify staging deployment completes successfully\n` +
                `4. Then retry production deployment with: [prod]\n\n` +
                `Production deployments require a successful staging deployment first.`;
              core.setFailed(errorMsg);
              throw new Error(errorMsg);
            }

            core.info(`✅ Staging verification passed`);
            core.info(`📍 Proceeding with production deployment of: ${targetSha}`)

      # STEP 9: Deploy to Production Environment
      # SSH into VM, checkout validated commit SHA, and restart service
      # SECURITY: Deployment uses exact validated SHA - never branch names
      # Production uses the same code tested in staging
      # Using centralized deploy-to-vm composite action
      - name: Deploy to Production
        id: deploy_production
        if: steps.validate.outputs.should_deploy == 'true' && steps.validate.outputs.environment == 'production'
        uses: ./.github/actions/deploy-to-vm
        with:
          commit-sha: ${{ steps.validate.outputs.pr_sha }}
          environment: production
          vm-host: ${{ vars.VM_HOST }}
          vm-user: ${{ vars.VM_USER }}
          vm-app-path: ${{ vars.VM_APP_PATH }}
          vm-service-name: ${{ vars.VM_SERVICE_NAME }}
          app-port: ${{ vars.APP_PORT }}
          api-key: ${{ secrets.API_KEY }}
          db-host: ${{ secrets.DB_HOST }}
          deployment-id: ${{ github.run_id }}

      # STEP 10: Post deployment status comment to PR
      # Runs always (success or failure) if deployment was attempted
      - name: Post Deployment Status
        if: always() && steps.check_deployed.outputs.already_deployed != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ needs.validate.outputs.environment }}';
            const sha = '${{ needs.validate.outputs.pr_sha }}';
            const prNumber = '${{ needs.validate.outputs.pr_number }}';
            const jobStatus = '${{ job.status }}';
            const prBranch = '${{ needs.validate.outputs.pr_branch }}';
            const buildTimestamp = '${{ steps.build_metadata.outputs.build_timestamp }}';
            const deploymentId = '${{ steps.build_metadata.outputs.deployment_id }}';
            const vmHost = process.env.VM_HOST;
            const vmAppPath = process.env.VM_APP_PATH;

            const statusEmoji = jobStatus === 'success' ? '✅' : '❌';
            const statusText = jobStatus === 'success' ? 'SUCCEEDED' : 'FAILED';

            // Get environment-specific outputs
            const deployStep = environment === 'staging' ? 'deploy_staging' : 'deploy_production';
            const readinessStatus = environment === 'staging'
              ? '${{ steps.deploy_staging.outputs.deployment-status }}'
              : '${{ steps.deploy_production.outputs.deployment-status }}';

            // Map readiness status to display text
            const readinessMap = {
              'deployed': '✅ Deployed',
              'failed': '❌ Failed',
              '': jobStatus === 'success' ? '✅ Deployed' : '❌ Failed'
            };
            const readinessDisplay = readinessMap[readinessStatus] || readinessStatus;

            let comment = `### ${statusEmoji} Deployment ${statusText}

            #### 📋 Deployment Details
            | Field | Value |
            |-------|-------|
            | **Environment** | \`${environment}\` |
            | **Status** | ${statusText} |
            | **Commit SHA** | \`${sha}\` |
            | **Build Timestamp** | \`${buildTimestamp}\` |
            | **Deployment ID** | \`${deploymentId}\` |
            | **VM Host** | \`${vmHost}\` |
            | **App Path** | \`${vmAppPath}\` |
            | **Service Status** | ${readinessDisplay} |
            `;

            if (jobStatus === 'success') {
              comment += `\n---\n#### 🌐 Access Information\n`;
              comment += `**VM:** ${vmHost}\n`;
              comment += `**Workflow Run:** [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;

              if (environment === 'staging') {
                comment += `\n💡 **Next step:** Test staging, then deploy to production with: \`[prod]\``;
              }
            } else {
              comment += `\n---\n#### ⚠️ Action Required\n`;
              comment += `Check workflow logs for detailed error information.\n\n`;
              comment += `**Workflow Run:** [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

      # STEP 11: Update GitHub Deployment Status
      # Updates the deployment record created in step 1 with final status
      # Runs always (success/failure/cancelled) if deployment was created
      - name: Update Deployment Status
        if: always() && steps.create_deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = Number('${{ steps.create_deployment.outputs.deployment_id }}');
            const environment = '${{ needs.validate.outputs.environment }}';
            const jobStatus = '${{ job.status }}';
            const alreadyDeployed = '${{ steps.check_deployed.outputs.already_deployed }}' === 'true';
            const prSha = '${{ needs.validate.outputs.pr_sha }}';

            // Sanitizer to remove 4-byte Unicode characters (emoji) that GitHub API rejects
            const sanitize = (s) => Array.from(s)
              .filter(ch => ch.codePointAt(0) <= 0xFFFF)
              .join('');

            let state;
            let description;

            if (alreadyDeployed) {
              state = 'success';
              description = `Skipped - SHA ${prSha.substring(0, 7)} already running in ${environment}`;
            } else if (jobStatus === 'success') {
              state = 'success';
              description = `Deployed SHA ${prSha.substring(0, 7)} to ${environment}`;
            } else if (jobStatus === 'failure') {
              state = 'failure';
              description = `Deployment to ${environment} failed`;
            } else {
              state = 'error';
              description = `Deployment to ${environment} ended with status: ${jobStatus}`;
            }

            // Sanitize description to prevent 422 errors from emoji/4-byte chars
            description = sanitize(description);

            const vmHost = process.env.VM_HOST;
            const environmentUrl = `http://${vmHost}/${environment}`;
            const logUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state,
              environment,
              description,
              environment_url: environmentUrl,
              log_url: logUrl,
              auto_inactive: true
            });

            core.info(`Deployment status updated: ${state}`);

      # STEP 12: Update Deployment History Wiki
      # Updates the GitHub Wiki with deployment history after successful deployment
      # Only runs if the deployment was successful (not skipped/failed)
      - name: Update Deployment History Wiki
        if: success() && steps.create_deployment.outputs.deployment_id
        uses: ./.github/actions/update-deployment-wiki
        with:
          wiki-token: ${{ secrets.WIKI_TOKEN }}
          github-repository: ${{ github.repository }}
