name: Deploy on Comment

# SECURITY ARCHITECTURE:
# This workflow uses issue_comment trigger which ALWAYS runs from the default branch (main).
# This prevents attackers from modifying the workflow in feature branches to bypass security checks.
# Even if a malicious PR contains a modified .github/workflows/deploy.yml, GitHub will ignore it
# and execute the version from the default branch only.
#
# Reference: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#issue_comment
on:
  issue_comment:
    types: [created]

# Explicit permissions following principle of least privilege
# This workflow can only read code/PRs and write comments - cannot push code or modify settings
permissions:
  contents: read        # Read repository contents for checkout
  pull-requests: read   # Read PR metadata for validation
  issues: write         # Post deployment status comments

# Concurrency control: Only ONE deployment at a time across all environments
# Cancel any in-progress deployment when a new one is triggered
# Prevents race conditions and ensures clean container state
concurrency:
  group: deployment
  cancel-in-progress: true

jobs:
  validate-and-deploy:
    # Security: Only run on pull request comments (not regular issues)
    if: github.event.issue.pull_request != null
    runs-on: self-hosted

    # Prevent runaway deployments - fail if job exceeds 15 minutes
    timeout-minutes: 15

    steps:
      # STEP 1: Validate deployment trigger and perform all security checks
      - name: Validate deployment trigger and permissions
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const validCommands = ['[staging]', '[prod]'];

            // STRICT COMMAND MATCHING: Only exact "[staging]" or "[prod]" triggers deployment
            // Prevents typos, variations, or injection attempts from triggering deployments
            if (!validCommands.includes(comment)) {
              core.info('Comment does not match deployment triggers: [staging] or [prod]');
              return { shouldDeploy: false };
            }

            // Determine target environment
            const environment = comment === '[staging]' ? 'staging' : 'production';
            core.info(`Deployment requested for: ${environment}`);

            // SECURITY CHECK 1: Verify commenter is repository owner
            // Only the repository owner can trigger deployments
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            if (context.payload.comment.user.login !== repo.owner.login) {
              core.setFailed(`❌ AUTHORIZATION FAILED: Only repository owner (${repo.owner.login}) can trigger deployments. You are: ${context.payload.comment.user.login}`);
              return { shouldDeploy: false };
            }
            core.info(`✅ Authorization check passed: ${context.payload.comment.user.login} is owner`);

            // Get PR details
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            // SECURITY CHECK 2: Verify PR is OPEN
            // Prevents deployment of closed or merged PRs
            if (pr.state !== 'open') {
              core.setFailed(`❌ VALIDATION FAILED: PR #${context.issue.number} is not open (state: ${pr.state})`);
              return { shouldDeploy: false };
            }
            core.info(`✅ PR state check passed: PR is open`);

            // SECURITY CHECK 3: Verify mergeable_state is "clean"
            // Prevents deployment if PR has conflicts, is blocked, behind, or in unknown state
            // "clean" means: all required checks passed, no conflicts, ready to merge
            if (pr.mergeable_state !== 'clean') {
              core.setFailed(`❌ VALIDATION FAILED: PR #${context.issue.number} mergeable_state is "${pr.mergeable_state}". Required: "clean". This PR may have conflicts, required checks failing, or be behind the base branch.`);
              return { shouldDeploy: false };
            }
            core.info(`✅ Mergeable state check passed: ${pr.mergeable_state}`);

            // SECURITY CHECK 4: Explicit check for merge conflicts
            // Double verification that no conflicts exist
            if (pr.mergeable === false) {
              core.setFailed(`❌ VALIDATION FAILED: PR #${context.issue.number} has merge conflicts. Resolve conflicts before deploying.`);
              return { shouldDeploy: false };
            }
            core.info(`✅ Merge conflicts check passed: No conflicts detected`);

            // SHA-BASED DEPLOYMENT SECURITY:
            // Extract exact commit SHA from PR HEAD and deploy ONLY that specific commit.
            // This prevents "hitchhiker commits" - a security issue where an attacker pushes
            // additional malicious commits to the PR branch after approval but before deployment.
            //
            // Attack scenario prevented:
            // 1. Attacker creates PR with commit A (looks safe)
            // 2. Owner reviews and approves commit A
            // 3. Attacker pushes commit B (malicious) to same branch
            // 4. Owner triggers deployment thinking they're deploying commit A
            // 5. If deploying by branch name, commit B would be deployed (security breach)
            // 6. With SHA-based deployment, only commit A is deployed (secure)
            //
            // By deploying the exact SHA that exists at comment time, we ensure the deployed
            // code matches what was reviewed, even if the branch is updated afterwards.
            const prSha = pr.head.sha;
            core.info(`📍 Target commit SHA: ${prSha}`);

            // Set outputs for subsequent steps
            core.setOutput('should_deploy', 'true');
            core.setOutput('environment', environment);
            core.setOutput('pr_sha', prSha);
            core.setOutput('pr_number', context.issue.number);
            core.setOutput('pr_branch', pr.head.ref);

            core.info(`✅ All validation checks passed. Proceeding with ${environment} deployment.`);

            return {
              shouldDeploy: true,
              environment: environment,
              prSha: prSha,
              prNumber: context.issue.number
            };

      # STEP 2: Checkout exact commit SHA from PR HEAD
      # SECURITY: Always checkout by exact SHA, NEVER by branch name
      # NEVER use git pull - always checkout specific commit
      # This ensures we deploy exactly what was validated, not what's currently on the branch
      - name: Checkout PR HEAD commit (exact SHA)
        if: steps.validate.outputs.should_deploy == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.validate.outputs.pr_sha }}
          fetch-depth: 1

      # STEP 3: Deploy to Staging Environment
      # Builds new Docker image tagged with commit SHA
      # Stops and removes any existing staging container
      - name: Deploy to Staging
        if: steps.validate.outputs.should_deploy == 'true' && steps.validate.outputs.environment == 'staging'
        env:
          COMMIT_SHA: ${{ steps.validate.outputs.pr_sha }}
          ENVIRONMENT: staging
          CONTAINER_NAME: myapp-staging
          PORT: 8001
        run: |
          echo "🚀 Starting staging deployment..."
          echo "📍 Commit SHA: ${COMMIT_SHA}"
          echo "🏷️  Environment: ${ENVIRONMENT}"
          echo "📦 Container: ${CONTAINER_NAME}"
          echo "🔌 Port: ${PORT}"

          # Stop and remove existing staging container if running
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            echo "🛑 Stopping existing container: ${CONTAINER_NAME}"
            docker stop ${CONTAINER_NAME} 2>/dev/null || true
            echo "🗑️  Removing existing container: ${CONTAINER_NAME}"
            docker rm ${CONTAINER_NAME} 2>/dev/null || true
          else
            echo "ℹ️  No existing container found"
          fi

          # Build Docker image with exact commit SHA tag
          echo "🔨 Building Docker image: ci-demo:${COMMIT_SHA}"
          docker build \
            --build-arg COMMIT_SHA=${COMMIT_SHA} \
            --build-arg ENVIRONMENT=${ENVIRONMENT} \
            -t ci-demo:${COMMIT_SHA} \
            .

          # Run new staging container
          echo "▶️  Running new container: ${CONTAINER_NAME}"
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${PORT}:8000 \
            ci-demo:${COMMIT_SHA}

          # Verify container is running
          sleep 2
          if docker ps --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            echo "✅ Staging deployment successful"
            echo "🌐 Container: ${CONTAINER_NAME}"
            echo "🔌 Port: ${PORT}"
            echo "📍 Commit: ${COMMIT_SHA}"
          else
            echo "❌ Container failed to start"
            docker logs ${CONTAINER_NAME}
            exit 1
          fi

      # STEP 4: Verify Staging Image Exists (Production Pre-Check)
      # PRODUCTION IMAGE IMMUTABILITY:
      # Production MUST NOT rebuild the Docker image. Here's why:
      #
      # 1. CONSISTENCY: The staging image was tested. Rebuilding could introduce differences
      #    due to timestamp differences, network conditions, or external dependency updates.
      #
      # 2. SECURITY: Rebuilding creates opportunity for supply chain attacks. If a dependency
      #    is compromised between staging build and production rebuild, production gets the
      #    malicious version while staging had the clean version.
      #
      # 3. COMPLIANCE: Many regulations require that production deployments are exact copies
      #    of tested artifacts, not rebuilt versions.
      #
      # 4. RELIABILITY: "What you test is what you deploy" - the binary deployed to production
      #    must be byte-for-byte identical to what was tested in staging.
      #
      # Therefore, production deployment FAILS if the staging image does not exist.
      # This enforces the staging-first workflow and prevents untested production deployments.
      - name: Verify Staging Image Exists
        if: steps.validate.outputs.should_deploy == 'true' && steps.validate.outputs.environment == 'production'
        env:
          COMMIT_SHA: ${{ steps.validate.outputs.pr_sha }}
        run: |
          echo "🔍 Checking for staging image: ci-demo:${COMMIT_SHA}"

          # Check if staging image exists
          if ! docker image inspect ci-demo:${COMMIT_SHA} >/dev/null 2>&1; then
            echo "❌ DEPLOYMENT FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Staging image does not exist: ci-demo:${COMMIT_SHA}"
            echo ""
            echo "Production deployments MUST use the staging image."
            echo "You MUST deploy to staging first:"
            echo "  1. Comment: [staging]"
            echo "  2. Wait for staging deployment to complete"
            echo "  3. Test staging environment"
            echo "  4. Comment: [prod]"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          echo "✅ Staging image verified: ci-demo:${COMMIT_SHA}"

      # STEP 5: Deploy to Production Environment
      # DOES NOT rebuild image - uses existing staging image
      # Stops and removes any existing production container
      - name: Deploy to Production
        if: steps.validate.outputs.should_deploy == 'true' && steps.validate.outputs.environment == 'production'
        env:
          COMMIT_SHA: ${{ steps.validate.outputs.pr_sha }}
          ENVIRONMENT: production
          CONTAINER_NAME: myapp-prod
          PORT: 8002
        run: |
          echo "🚀 Starting production deployment..."
          echo "📍 Commit SHA: ${COMMIT_SHA}"
          echo "🏷️  Environment: ${ENVIRONMENT}"
          echo "📦 Container: ${CONTAINER_NAME}"
          echo "🔌 Port: ${PORT}"
          echo "⚠️  Using existing staging image (NO REBUILD)"

          # Stop and remove existing production container if running
          if docker ps -a --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            echo "🛑 Stopping existing container: ${CONTAINER_NAME}"
            docker stop ${CONTAINER_NAME} 2>/dev/null || true
            echo "🗑️  Removing existing container: ${CONTAINER_NAME}"
            docker rm ${CONTAINER_NAME} 2>/dev/null || true
          else
            echo "ℹ️  No existing container found"
          fi

          # Run production container using PRE-BUILT staging image
          # DO NOT REBUILD - use existing image only
          echo "▶️  Running new container: ${CONTAINER_NAME}"
          docker run -d \
            --name ${CONTAINER_NAME} \
            -p ${PORT}:8000 \
            ci-demo:${COMMIT_SHA}

          # Verify container is running
          sleep 2
          if docker ps --format '{{.Names}}' | grep -q "^${CONTAINER_NAME}$"; then
            echo "✅ Production deployment successful"
            echo "🌐 Container: ${CONTAINER_NAME}"
            echo "🔌 Port: ${PORT}"
            echo "📍 Commit: ${COMMIT_SHA}"
          else
            echo "❌ Container failed to start"
            docker logs ${CONTAINER_NAME}
            exit 1
          fi

      # STEP 6: Post deployment status comment to PR
      # Runs always (success or failure) if validation passed
      - name: Post Deployment Status
        if: always() && steps.validate.outputs.should_deploy == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ steps.validate.outputs.environment }}';
            const sha = '${{ steps.validate.outputs.pr_sha }}';
            const jobStatus = '${{ job.status }}';
            const prBranch = '${{ steps.validate.outputs.pr_branch }}';

            const statusEmoji = jobStatus === 'success' ? '✅' : '❌';
            const statusText = jobStatus === 'success' ? 'SUCCEEDED' : 'FAILED';
            const port = environment === 'staging' ? '8001' : '8002';
            const containerName = environment === 'staging' ? 'myapp-staging' : 'myapp-prod';

            let comment = `### ${statusEmoji} Deployment ${statusText}

            **Environment:** \`${environment}\`
            **Status:** ${statusText}
            **Commit SHA:** \`${sha}\`
            **Branch:** \`${prBranch}\`
            **Container:** \`${containerName}\`
            **Port:** \`${port}\`
            `;

            if (jobStatus === 'success') {
              comment += `\n---\n🌐 **Access:** http://localhost:${port}/\n`;

              if (environment === 'staging') {
                comment += `\n💡 **Next step:** Test staging, then deploy to production with: \`[prod]\``;
              }
            } else {
              comment += `\n---\n⚠️ **Action Required:** Check workflow logs for details\n`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
