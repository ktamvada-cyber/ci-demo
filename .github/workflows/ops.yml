name: Ops Control Plane

# SECURITY ARCHITECTURE:
# This workflow provides an Ops control plane with TWO trigger mechanisms:
#   1. workflow_dispatch: Manual execution from GitHub Actions UI
#   2. issue_comment: ChatOps commands from a designated "Ops Console" issue
#
# For issue_comment trigger, this workflow ALWAYS runs from the default branch (main).
# This prevents attackers from modifying the workflow in feature branches to bypass security.
# Even if a malicious PR contains a modified .github/workflows/ops.yml, GitHub will ignore it
# and execute the version from the default branch only.
#
# Reference: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#issue_comment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      action:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - restart
          - redeploy
          - rollback
      sha:
        description: 'Target commit SHA, tag, or branch (e.g., abc123..., v1.2.3, main). Required for redeploy/rollback unless steps provided.'
        required: false
        type: string
      steps:
        description: 'Rollback steps (used only for rollback if sha not provided; default=1)'
        required: false
        type: string
      confirm:
        description: 'Type "yes" to confirm production rollback/redeploy'
        required: false
        type: string

  issue_comment:
    types: [created]

# Environment variables (workflow-level)
env:
  # SECURITY: Only allow ops commands from this specific issue number (Ops Console)
  # Commands from any other issue will be rejected
  # TODO: Create a pinned "Ops Console" issue and set the number here
  OPS_ISSUE_NUMBER: 2

  # VM deployment configuration constants
  STAGING_PORT: 9001
  PROD_PORT: 9002
  SERVICE_DIR: $HOME/deployments/myservice
  HEALTH_CHECK_MAX_RETRIES: 10
  HEALTH_CHECK_RETRY_SLEEP: 2

# Explicit permissions following principle of least privilege
# This workflow can only read code and write to issues/deployments - cannot push code or modify settings
permissions:
  contents: read        # Read repository contents for checkout (if needed)
  issues: write         # Post ops status comments to Ops Console issue
  deployments: write    # Create GitHub Deployments via API for tracking
  pull-requests: read   # Not strictly required but included for consistency
  checks: read          # Read check runs for coverage gate

# Concurrency control: Only ONE ops operation at a time across all environments
# Cancel any in-progress ops action when a new one is triggered
# Prevents race conditions and ensures clean container state
concurrency:
  group: ops
  cancel-in-progress: true

jobs:
  ops:
    runs-on: self-hosted

    # GitHub Environment protection (requires manual approval for production if configured)
    # Dynamic environment selection based on validation step output
    # Strict matching: [prod-restart], [prod-redeploy...], [prod-rollback...]
    environment:
      name: ${{ github.event.inputs.environment || (github.event_name == 'issue_comment' && (github.event.comment.body == '[prod-restart]' || startsWith(github.event.comment.body, '[prod-redeploy') || startsWith(github.event.comment.body, '[prod-rollback')) && 'production' || 'staging') }}
      url: ${{ (github.event.inputs.environment == 'production' || (github.event_name == 'issue_comment' && (github.event.comment.body == '[prod-restart]' || startsWith(github.event.comment.body, '[prod-redeploy') || startsWith(github.event.comment.body, '[prod-rollback')))) && 'http://localhost:9002' || 'http://localhost:9001' }}

    # Prevent runaway operations - fail if job exceeds 15 minutes
    timeout-minutes: 15

    steps:
      # STEP 0: Cleanup orphan processes before ops operation
      - name: Ensure no orphan processes
        run: |
          echo "🧹 Cleaning up any orphan processes..."
          pkill -f "uvicorn app.main" || true
          echo "✅ Cleanup complete"

      # STEP 1: Validate and parse ops trigger
      # Detects trigger source (workflow_dispatch vs issue_comment)
      # Parses and validates inputs strictly
      # Enforces OPS_ISSUE_NUMBER restriction for issue_comment
      # Enforces authorization allowlists
      - name: Validate and Parse Ops Trigger
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            // Detect trigger source
            const isWorkflowDispatch = context.eventName === 'workflow_dispatch';
            const isIssueComment = context.eventName === 'issue_comment';

            core.info(`📋 Trigger: ${context.eventName}`);

            let action, environment, targetSha, steps, confirm;
            let requester = context.actor;

            if (isWorkflowDispatch) {
              // Parse workflow_dispatch inputs
              action = '${{ github.event.inputs.action }}';
              environment = '${{ github.event.inputs.environment }}';
              targetSha = '${{ github.event.inputs.sha }}' || '';
              const stepsInput = '${{ github.event.inputs.steps }}' || '';
              steps = stepsInput || '1';
              confirm = '${{ github.event.inputs.confirm }}' || '';

              core.info(`🎛️  Workflow Dispatch Input:`);
              core.info(`   Action: ${action}`);
              core.info(`   Environment: ${environment}`);
              core.info(`   SHA: ${targetSha || '(auto)'}`);
              core.info(`   Steps: ${steps}`);
              core.info(`   Confirm: ${confirm || '(not provided)'}`);

              // VALIDATION CHECK: Cannot provide both sha and steps (detect if both inputs were explicitly set)
              if (targetSha && stepsInput) {
                const errorMsg = `❌ VALIDATION FAILED: Cannot provide both sha and steps. Choose one.`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('should_run', 'false');
                core.setFailed(errorMsg);
                return { shouldRun: false };
              }

            } else if (isIssueComment) {
              // SECURITY CHECK 1: Verify comment is on the Ops Console issue
              const opsIssueNumber = Number(process.env.OPS_ISSUE_NUMBER);
              const commentIssueNumber = context.issue.number;

              if (commentIssueNumber !== opsIssueNumber) {
                const errorMsg = `❌ SECURITY: Ops commands only allowed on issue #${opsIssueNumber}. This is issue #${commentIssueNumber}.`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('should_run', 'false');
                core.info(errorMsg);
                return { shouldRun: false };
              }
              core.info(`✅ Ops Console issue check passed (issue #${opsIssueNumber})`);

              // Parse strict command grammar
              const comment = context.payload.comment.body.trim();
              requester = context.payload.comment.user.login;

              core.info(`💬 Comment: "${comment}"`);
              core.info(`👤 Requester: ${requester}`);

              // Valid command patterns (strict):
              // [staging-restart]
              // [prod-restart]
              // [staging-redeploy]
              // [prod-redeploy confirm=yes]
              // [staging-rollback sha=<sha|tag|ref>]
              // [prod-rollback sha=<sha|tag|ref> confirm=yes]
              // [staging-rollback steps=<int>]
              // [prod-rollback steps=<int> confirm=yes]
              //
              // SHA accepts: 40-char hex, tags (v1.2.3), branches (main), or refs (refs/tags/v1.0.0)
              // Tags/refs will be resolved to commit SHAs before deployment

              const commandRegex = /^\[(staging|prod)-(restart|redeploy|rollback)(?:\s+sha=([^\s\]]+))?(?:\s+steps=(\d+))?(?:\s+confirm=(yes))?\]$/;
              const match = comment.match(commandRegex);

              if (!match) {
                const errorMsg = `❌ Invalid ops command syntax. Valid commands:\n` +
                  `  [staging-restart]\n` +
                  `  [prod-restart]\n` +
                  `  [staging-redeploy]\n` +
                  `  [staging-redeploy sha=<sha|tag|ref>]\n` +
                  `  [prod-redeploy confirm=yes]\n` +
                  `  [prod-redeploy sha=<sha|tag|ref> confirm=yes]\n` +
                  `  [staging-rollback sha=<sha|tag|ref>]\n` +
                  `  [staging-rollback steps=<int>]\n` +
                  `  [prod-rollback sha=<sha|tag|ref> confirm=yes]\n` +
                  `  [prod-rollback steps=<int> confirm=yes]\n` +
                  `\nNote: sha= accepts commit SHAs, tags (v1.2.3), or branch names`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('should_run', 'false');
                core.info('Invalid command syntax');
                return { shouldRun: false };
              }

              environment = match[1] === 'staging' ? 'staging' : 'production';
              action = match[2];
              targetSha = match[3] || '';
              const stepsExplicit = match[4]; // undefined if not provided
              steps = stepsExplicit || '1';
              confirm = match[5] || '';

              // TIGHTER ENFORCEMENT: Reject prod rollback/redeploy without confirm at parse time
              if (environment === 'production' && (action === 'rollback' || action === 'redeploy')) {
                if (confirm !== 'yes') {
                  const errorMsg = `❌ Invalid command: Production ${action} requires confirm=yes.\nExample: [prod-${action} ${targetSha ? 'sha=' + targetSha : 'steps=' + steps} confirm=yes]`;
                  core.setOutput('error_message', errorMsg);
                  core.setOutput('should_run', 'false');
                  core.info('Production command missing confirm=yes');
                  return { shouldRun: false };
                }
              }

              // VALIDATION CHECK: Cannot provide both sha and steps (detect if both were present in command)
              if (targetSha && stepsExplicit) {
                const errorMsg = `❌ VALIDATION FAILED: Cannot provide both sha and steps. Choose one.`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('should_run', 'false');
                core.setFailed(errorMsg);
                return { shouldRun: false };
              }

              core.info(`✅ Command parsed successfully:`);
              core.info(`   Environment: ${environment}`);
              core.info(`   Action: ${action}`);
              core.info(`   SHA: ${targetSha || '(auto)'}`);
              core.info(`   Steps: ${steps}`);
              core.info(`   Confirm: ${confirm || '(not provided)'}`);
            } else {
              core.setOutput('should_run', 'false');
              core.info('Unsupported trigger event');
              return { shouldRun: false };
            }

            // SECURITY CHECK 2: Verify requester is authorized for the target environment
            const stagingAuthorizedUsers = [
              'ktamvada-cyber',  // repository owner
              'gromag'           // additional staging operator
            ];

            const productionAuthorizedUsers = [
              'ktamvada-cyber',  // repository owner
              'gromag'           // production operator
            ];

            const authorizedUsers = environment === 'staging'
              ? stagingAuthorizedUsers
              : productionAuthorizedUsers;

            if (!authorizedUsers.includes(requester)) {
              const allowedList = authorizedUsers.join(', ');
              const errorMsg = `❌ AUTHORIZATION FAILED: User "${requester}" is not authorized for ${environment} ops. Authorized users: ${allowedList}`;
              core.setOutput('error_message', errorMsg);
              core.setOutput('should_run', 'false');
              core.setFailed(errorMsg);
              return { shouldRun: false };
            }
            core.info(`✅ Authorization check passed: ${requester} is authorized for ${environment} ops`);

            // SECURITY CHECK 3: Production rollback/redeploy requires confirm=yes (redundant check for workflow_dispatch)
            if (environment === 'production' && (action === 'rollback' || action === 'redeploy')) {
              if (confirm !== 'yes') {
                const errorMsg = `❌ CONFIRMATION REQUIRED: Production ${action} requires confirm=yes. This is a safety gate.`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('should_run', 'false');
                core.setFailed(errorMsg);
                return { shouldRun: false };
              }
              core.info(`✅ Production ${action} confirmation received`);
            }

            // VALIDATION CHECK 4: For rollback, ensure either sha or steps is provided
            if (action === 'rollback') {
              if (!targetSha && !steps) {
                const errorMsg = `❌ VALIDATION FAILED: Rollback requires either sha=<40hex> or steps=<int>`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('should_run', 'false');
                core.setFailed(errorMsg);
                return { shouldRun: false };
              }
              core.info(`✅ Rollback target validated`);
            }

            // Determine port from workflow env constants
            const port = environment === 'staging' ? process.env.STAGING_PORT : process.env.PROD_PORT;

            // Set outputs
            core.setOutput('should_run', 'true');
            core.setOutput('action', action);
            core.setOutput('environment', environment);
            core.setOutput('target_sha', targetSha);
            core.setOutput('steps', steps);
            core.setOutput('confirm', confirm);
            core.setOutput('port', port);
            core.setOutput('requester', requester);
            core.setOutput('skip_tagging', 'true');  // Ops workflow never tags

            core.info(`✅ All validation checks passed. Proceeding with ${action} on ${environment}.`);

            return {
              shouldRun: true,
              action,
              environment,
              port
            };

      # STEP 2: Post validation failure message
      # Runs if validation step completed but operation was rejected
      - name: Post Validation Failure
        if: always() && steps.validate.outputs.should_run == 'false' && steps.validate.outputs.error_message != ''
        uses: actions/github-script@v7
        with:
          script: |
            const errorMessage = '${{ steps.validate.outputs.error_message }}';
            const opsIssueNumber = Number(process.env.OPS_ISSUE_NUMBER);
            const isWorkflowDispatch = context.eventName === 'workflow_dispatch';

            const comment = `### ❌ Ops Command Rejected

            **Error Details:**

            ${errorMessage}

            ---
            📋 **View Full Logs:** [Workflow Run #${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            // For workflow_dispatch, try to post to ops console
            // For issue_comment, post to the same issue (which should be ops console)
            const targetIssue = isWorkflowDispatch ? opsIssueNumber : context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetIssue,
              body: comment
            });

      # STEP 2.5: Resolve Ref/Tag to SHA
      # If target_sha is provided, resolve it to a 40-char commit SHA
      # Accepts: 40-char SHA (pass-through), tags (v1.2.3), branches (main), or refs (refs/tags/v1.0.0)
      # This ensures the coverage gate always checks a real commit SHA
      - name: Resolve Ref to SHA
        id: resolve_sha
        if: |
          steps.validate.outputs.should_run == 'true' &&
          steps.validate.outputs.target_sha != ''
        uses: actions/github-script@v7
        with:
          script: |
            const inputRef = '${{ steps.validate.outputs.target_sha }}';
            const action = '${{ steps.validate.outputs.action }}';

            core.info(`🔍 Resolving ref to SHA: ${inputRef}`);

            // Check if input is already a 40-char hex SHA
            if (/^[a-f0-9]{40}$/.test(inputRef)) {
              core.info(`✅ Input is already a 40-char SHA: ${inputRef}`);
              core.setOutput('resolved_sha', inputRef);
              core.setOutput('is_tag', 'false');
              core.setOutput('original_ref', inputRef);
              return { resolvedSha: inputRef, isTag: false };
            }

            core.info(`📌 Input is a ref/tag/branch, resolving to commit SHA...`);

            try {
              // Try to resolve as a ref (handles tags, branches, etc.)
              // First try refs/tags/<input> (most common for version tags)
              let resolvedSha = '';
              let refType = '';

              try {
                const { data: tagRef } = await github.rest.git.getRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${inputRef}`
                });

                // For annotated tags, tagRef.object.sha is the tag object SHA
                // We need to dereference to get the commit SHA
                if (tagRef.object.type === 'tag') {
                  const { data: tagObject } = await github.rest.git.getTag({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    tag_sha: tagRef.object.sha
                  });
                  resolvedSha = tagObject.object.sha;
                  refType = 'annotated tag';
                } else {
                  resolvedSha = tagRef.object.sha;
                  refType = 'lightweight tag';
                }

                core.info(`✅ Resolved tag "${inputRef}" (${refType}) to commit SHA: ${resolvedSha}`);
              } catch (tagError) {
                // Tag not found, try as a branch
                try {
                  const { data: branchRef } = await github.rest.git.getRef({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: `heads/${inputRef}`
                  });
                  resolvedSha = branchRef.object.sha;
                  refType = 'branch';
                  core.info(`✅ Resolved branch "${inputRef}" to commit SHA: ${resolvedSha}`);
                } catch (branchError) {
                  // Not a tag or branch, try as a raw ref (e.g., refs/pull/123/head)
                  try {
                    const { data: rawRef } = await github.rest.git.getRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: inputRef
                    });
                    resolvedSha = rawRef.object.sha;
                    refType = 'raw ref';
                    core.info(`✅ Resolved ref "${inputRef}" to commit SHA: ${resolvedSha}`);
                  } catch (refError) {
                    // Last resort: try to get commit directly (handles short SHAs)
                    try {
                      const { data: commit } = await github.rest.repos.getCommit({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        ref: inputRef
                      });
                      resolvedSha = commit.sha;
                      refType = 'commit';
                      core.info(`✅ Resolved commit "${inputRef}" to full SHA: ${resolvedSha}`);
                    } catch (commitError) {
                      const errorMsg = `❌ REF RESOLUTION FAILED: Could not resolve "${inputRef}" to a commit SHA.\n\nTried: tag, branch, ref, commit.\n\nPlease provide a valid commit SHA, tag, or branch name.`;
                      core.setOutput('error_message', errorMsg);
                      core.setOutput('original_ref', inputRef);
                      core.setFailed(errorMsg);
                      return { error: errorMsg };
                    }
                  }
                }
              }

              // Verify resolved SHA is a valid 40-char hex string
              if (!/^[a-f0-9]{40}$/.test(resolvedSha)) {
                const errorMsg = `❌ REF RESOLUTION FAILED: Resolved SHA "${resolvedSha}" is not a valid 40-char hex string.`;
                core.setOutput('error_message', errorMsg);
                core.setOutput('original_ref', inputRef);
                core.setFailed(errorMsg);
                return { error: errorMsg };
              }

              core.setOutput('resolved_sha', resolvedSha);
              core.setOutput('is_tag', refType.includes('tag') ? 'true' : 'false');
              core.setOutput('original_ref', inputRef);
              core.setOutput('ref_type', refType);

              core.info(`✅ Ref resolution complete: ${inputRef} (${refType}) → ${resolvedSha}`);

              return {
                resolvedSha,
                isTag: refType.includes('tag'),
                refType,
                originalRef: inputRef
              };

            } catch (error) {
              const errorMsg = `❌ REF RESOLUTION ERROR: ${error.message}`;
              core.setOutput('error_message', errorMsg);
              core.setOutput('original_ref', inputRef);
              core.setFailed(errorMsg);
              return { error: errorMsg };
            }

      # STEP 2.6: Post ref resolution failure message
      # Runs if ref resolution failed
      - name: Post Ref Resolution Failure
        if: always() && steps.resolve_sha.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const errorMessage = '${{ steps.resolve_sha.outputs.error_message }}';
            const originalRef = '${{ steps.resolve_sha.outputs.original_ref }}';
            const opsIssueNumber = Number(process.env.OPS_ISSUE_NUMBER);
            const isWorkflowDispatch = context.eventName === 'workflow_dispatch';
            const action = '${{ steps.validate.outputs.action }}';

            const comment = `### ❌ ${action.charAt(0).toUpperCase() + action.slice(1)} Blocked - Ref Resolution Failed

            **Error Details:**

            ${errorMessage || '❌ Failed to resolve ref to commit SHA - see workflow logs'}

            ---

            #### 🔧 How to Fix

            1. Verify the ref/tag/branch exists: \`${originalRef}\`
            2. Check for typos in the ref name
            3. Use a valid commit SHA, tag name, or branch name
            4. Retry the operation with a valid ref

            **Examples:**
            - Commit SHA: \`abc123...def\` (40 chars)
            - Tag: \`v1.2.3\`
            - Branch: \`main\`

            ---
            📋 **View Ops Workflow:** [Run #${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            // For workflow_dispatch, try to post to ops console
            // For issue_comment, post to the same issue (which should be ops console)
            const targetIssue = isWorkflowDispatch ? opsIssueNumber : context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetIssue,
              body: comment
            });

      # STEP 3: Determine current SHA from service directory
      # Extract current SHA from git repository for rollback calculations
      - name: Determine Current SHA
        id: determine_current
        if: steps.validate.outputs.should_run == 'true'
        run: |
          echo "🔍 Determining current state..."

          CURRENT_SHA=""

          # Try to get current SHA from service directory
          if [ -d "${SERVICE_DIR}" ]; then
            cd ${SERVICE_DIR}
            CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            if [ -n "$CURRENT_SHA" ]; then
              echo "📍 Current SHA: ${CURRENT_SHA}"
            else
              echo "⚠️  Could not determine current SHA from git repository"
            fi
          else
            echo "ℹ️  Service directory does not exist"
          fi

          # Output results
          echo "current_sha=${CURRENT_SHA}" >> $GITHUB_OUTPUT

      # STEP 4: Compute Rollback Target (GitHub Deployments API)
      # PRIMARY source of truth for rollback-by-steps
      # Query GitHub Deployments API to find previous successful deployments
      # Only runs when: rollback action + no SHA provided + resolve_sha was skipped (not failed)
      # If resolve_sha failed, the workflow should have already exited with error
      - name: Compute Rollback Target (GitHub Deployments API)
        id: compute_rollback_api
        if: |
          steps.validate.outputs.should_run == 'true' &&
          steps.validate.outputs.action == 'rollback' &&
          steps.validate.outputs.target_sha == '' &&
          steps.resolve_sha.outcome == 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ steps.validate.outputs.environment }}';
            const stepsBack = Number('${{ steps.validate.outputs.steps }}');
            const currentSha = '${{ steps.determine_current.outputs.current_sha }}';

            core.info(`🔍 Querying GitHub Deployments API for ${environment} history`);
            core.info(`   Current SHA: ${currentSha || '(unknown)'}`);
            core.info(`   Steps back: ${stepsBack}`);

            // Validate stepsBack
            if (stepsBack < 1) {
              core.info('⚠️  Invalid steps value (must be >= 1)');
              core.setOutput('used_api', 'false');
              core.setOutput('api_target_sha', '');
              return { usedApi: false };
            }

            try {
              // Query deployments for this repo and environment (limit to recent 50 for performance)
              const { data: allDeployments } = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment,
                per_page: 50
              });

              core.info(`Found ${allDeployments.length} deployments for ${environment}`);

              // Sort by created_at descending (newest first) explicitly
              const deployments = allDeployments.sort((a, b) =>
                new Date(b.created_at) - new Date(a.created_at)
              );

              // Build array of successful deployment SHAs (deduplicate)
              const successfulShas = [];
              const seenShas = new Set();
              let skippedNonShaRef = 0;

              for (const deployment of deployments) {
                // Extract SHA from deployment ref first
                const ref = deployment.ref;
                // ref could be a SHA or a branch name; only process SHA format
                if (!ref || !/^[a-f0-9]{40}$/.test(ref)) {
                  skippedNonShaRef++;
                  continue;
                }

                // Skip if already seen (deduplicate)
                if (seenShas.has(ref)) {
                  continue;
                }

                // Get statuses for this deployment
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  per_page: 10
                });

                // Treat a deployment as "successful" if it EVER reached success.
                // Many repos mark older successful deployments as "inactive" via auto_inactive:true.
                const everSucceeded = statuses.some(s => s.state === 'success');

                if (everSucceeded) {
                  successfulShas.push(ref);
                  seenShas.add(ref);
                  core.info(`✅ Accepted deployment ${deployment.id}: latest=${statuses[0]?.state}, everSucceeded=true, ref=${ref.substring(0,7)}`);
                } else {
                  core.info(`⛔ Skipped deployment ${deployment.id}: latest=${statuses[0]?.state}, everSucceeded=false`);
                }
              }

              core.info(`ℹ️  Skipped ${skippedNonShaRef} deployments with non-SHA ref (e.g., ref=main)`);
              core.info(`Found ${successfulShas.length} successful deployments (deduplicated)`);

              if (successfulShas.length === 0) {
                core.info('⚠️  No successful deployments found in API');
                core.setOutput('used_api', 'false');
                core.setOutput('api_target_sha', '');
                return { usedApi: false };
              }

              // Choose rollback target
              // Array is newest-first: [newest, previous, 2-back, 3-back, ...]
              // steps=1 means "previous" (index 1), steps=2 means "2-back" (index 2), etc.
              let targetSha = '';

              if (currentSha) {
                // Find current SHA in array
                const currentIndex = successfulShas.indexOf(currentSha);

                if (currentIndex >= 0) {
                  // Current SHA found at index i, target is array[i + stepsBack]
                  const targetIndex = currentIndex + stepsBack;

                  if (targetIndex < successfulShas.length) {
                    targetSha = successfulShas[targetIndex];
                    core.info(`✅ Found current SHA at index ${currentIndex}, target at index ${targetIndex}`);
                  } else {
                    core.info(`⚠️  Target index ${targetIndex} exceeds history (${successfulShas.length} entries)`);
                  }
                } else {
                  // Current SHA not in history, use array[stepsBack]
                  // steps=1 => index 1 (previous), steps=2 => index 2 (2-back)
                  const targetIndex = stepsBack;

                  if (targetIndex < successfulShas.length) {
                    targetSha = successfulShas[targetIndex];
                    core.info(`ℹ️  Current SHA not in history, using index ${targetIndex}`);
                  } else {
                    core.info(`⚠️  Target index ${targetIndex} out of bounds (${successfulShas.length} entries)`);
                  }
                }
              } else {
                // No current SHA, use array[stepsBack]
                // steps=1 => index 1 (previous), steps=2 => index 2 (2-back)
                const targetIndex = stepsBack;

                if (targetIndex < successfulShas.length) {
                  targetSha = successfulShas[targetIndex];
                  core.info(`ℹ️  No current SHA, using index ${targetIndex}`);
                } else {
                  core.info(`⚠️  Target index ${targetIndex} out of bounds (${successfulShas.length} entries)`);
                }
              }

              if (targetSha) {
                core.setOutput('used_api', 'true');
                core.setOutput('api_target_sha', targetSha);
                core.info(`✅ API rollback target: ${targetSha}`);
                return { usedApi: true, targetSha };
              } else {
                core.info('⚠️  Could not determine rollback target from API');
                core.setOutput('used_api', 'false');
                core.setOutput('api_target_sha', '');
                return { usedApi: false };
              }

            } catch (error) {
              core.info(`⚠️  API query failed: ${error.message}`);
              core.setOutput('used_api', 'false');
              core.setOutput('api_target_sha', '');
              return { usedApi: false };
            }

      # STEP 5: Determine target SHA for operation
      # For restart: infer SHA from running container
      # For redeploy: use resolved SHA (from tag/ref) or infer from running container
      # For rollback: use resolved SHA (from tag/ref), API result, or local history fallback
      - name: Determine Target SHA
        id: determine_sha
        if: steps.validate.outputs.should_run == 'true'
        env:
          ACTION: ${{ steps.validate.outputs.action }}
          ENVIRONMENT: ${{ steps.validate.outputs.environment }}
          CONTAINER_NAME: ${{ steps.validate.outputs.container_name }}
          TARGET_SHA: ${{ steps.resolve_sha.outputs.resolved_sha || steps.validate.outputs.target_sha }}
          ORIGINAL_REF: ${{ steps.resolve_sha.outputs.original_ref || steps.validate.outputs.target_sha }}
          STEPS: ${{ steps.validate.outputs.steps }}
          CURRENT_SHA: ${{ steps.determine_current.outputs.current_sha }}
          CURRENT_IMAGE: ${{ steps.determine_current.outputs.current_image }}
          API_TARGET_SHA: ${{ steps.compute_rollback_api.outputs.api_target_sha }}
          USED_API: ${{ steps.compute_rollback_api.outputs.used_api }}
        run: |
          echo "🔍 Determining target SHA for ${ACTION}..."

          FINAL_SHA=""
          FINAL_IMAGE_REF=""

          if [ "$ACTION" = "restart" ]; then
            # For restart, we use current SHA (if available) but don't require it
            FINAL_SHA="${CURRENT_SHA}"
            FINAL_IMAGE_REF="${CURRENT_IMAGE}"
            echo "♻️  Restart operation: using current SHA/image"

          elif [ "$ACTION" = "redeploy" ]; then
            # For redeploy, use provided SHA or current SHA/image
            if [ -n "$TARGET_SHA" ]; then
              FINAL_SHA="$TARGET_SHA"
              FINAL_IMAGE_REF="${IMAGE_NAME}:${FINAL_SHA}"
              if [ -n "$ORIGINAL_REF" ] && [ "$ORIGINAL_REF" != "$TARGET_SHA" ]; then
                echo "🎯 Redeploy with SHA from ${ORIGINAL_REF}: ${FINAL_SHA}"
              else
                echo "🎯 Redeploy with provided SHA: ${FINAL_SHA}"
              fi
            else
              # Use current container's image (allow redeploy from inferred image)
              if [ -z "$CURRENT_IMAGE" ]; then
                echo "❌ ERROR: Cannot redeploy without target SHA when no container is running"
                echo "   Please provide sha=<sha|tag|ref> or ensure a container is currently running"
                echo "   Examples: sha=abc123...def, sha=v1.2.3, sha=main"
                exit 1
              fi
              FINAL_SHA="${CURRENT_SHA}"
              FINAL_IMAGE_REF="${CURRENT_IMAGE}"
              echo "🔄 Redeploy with current SHA/image: ${FINAL_SHA:-'(from image)'}"
            fi

          elif [ "$ACTION" = "rollback" ]; then
            # For rollback, prioritize: provided SHA (resolved from tag/ref) > API result > local history
            if [ -n "$TARGET_SHA" ]; then
              FINAL_SHA="$TARGET_SHA"
              if [ -n "$ORIGINAL_REF" ] && [ "$ORIGINAL_REF" != "$TARGET_SHA" ]; then
                echo "🎯 Rollback to SHA from ${ORIGINAL_REF}: ${FINAL_SHA}"
              else
                echo "🎯 Rollback to provided SHA: ${FINAL_SHA}"
              fi

            elif [ "$USED_API" = "true" ] && [ -n "$API_TARGET_SHA" ]; then
              # Use API result (PRIMARY source of truth)
              FINAL_SHA="$API_TARGET_SHA"
              echo "✅ Rollback target from GitHub Deployments API: ${FINAL_SHA}"

            else
              # Fallback to local history file
              echo "📚 Calculating rollback target from local history (${STEPS} step(s) back)..."

              HISTORY_FILE="/tmp/myapp-${ENVIRONMENT}.history"

              if [ -f "$HISTORY_FILE" ]; then
                echo "📁 Using local history fallback: ${HISTORY_FILE}"

                # Extract all SHAs from history (in chronological order, newest at bottom)
                # Filter to only lines with ' sha=' to exclude restart-only entries
                HISTORY_SHAS=$(grep -o ' sha=[a-f0-9]\{40\}' "$HISTORY_FILE" | cut -d= -f2)

                if [ -z "$HISTORY_SHAS" ]; then
                  echo "❌ ERROR: No SHA-based deployments in local history"
                  exit 1
                fi

                # Count total SHA entries
                SHA_COUNT=$(echo "$HISTORY_SHAS" | wc -l | tr -d ' ')
                echo "ℹ️  Found ${SHA_COUNT} SHA-based deployments in local history"

                HISTORY_SHA=""

                if [ -n "$CURRENT_SHA" ]; then
                  # Find current SHA position in reversed list (newest first, 1-indexed)
                  CURRENT_INDEX=$(echo "$HISTORY_SHAS" | tac | grep -n "^${CURRENT_SHA}$" | tail -1 | cut -d: -f1 || echo "0")

                  if [ "$CURRENT_INDEX" -gt 0 ]; then
                    # Found current SHA. Target is STEPS further back
                    # Array is newest-first: [current, previous, 2-back, ...]
                    # steps=1 → previous (current+1), steps=2 → 2-back (current+2)
                    TARGET_INDEX=$((CURRENT_INDEX + STEPS))

                    # Bounds check
                    if [ "$TARGET_INDEX" -le "$SHA_COUNT" ]; then
                      # Extract SHA at target index (from reversed list)
                      HISTORY_SHA=$(echo "$HISTORY_SHAS" | tac | sed -n "${TARGET_INDEX}p")
                      echo "ℹ️  Current SHA at position ${CURRENT_INDEX}, target at position ${TARGET_INDEX}"
                    else
                      echo "❌ ERROR: Target position ${TARGET_INDEX} exceeds history (${SHA_COUNT} entries)"
                      echo "   Cannot rollback ${STEPS} step(s) from current position ${CURRENT_INDEX}"
                      exit 1
                    fi
                  else
                    # Current SHA not in history - use newest deployment as baseline (index 1)
                    # Then apply steps from that baseline: target = 1 + steps
                    # steps=1 → index 2 (previous from baseline), steps=2 → index 3 (2-back from baseline)
                    TARGET_INDEX=$((1 + STEPS))

                    echo "ℹ️  Current SHA not in history; using newest deployment (index 1) as baseline"

                    # Bounds check
                    if [ "$TARGET_INDEX" -le "$SHA_COUNT" ]; then
                      HISTORY_SHA=$(echo "$HISTORY_SHAS" | tac | sed -n "${TARGET_INDEX}p")
                      echo "ℹ️  Baseline at position 1, target at position ${TARGET_INDEX}"
                    else
                      echo "❌ ERROR: Not enough SHA deployments in history to rollback ${STEPS} step(s)"
                      echo "   Need at least $((STEPS + 1)) entries, found ${SHA_COUNT}"
                      exit 1
                    fi
                  fi
                else
                  # No current SHA - use newest deployment as baseline (index 1)
                  # Then apply steps from that baseline: target = 1 + steps
                  # steps=1 → index 2 (previous from baseline), steps=2 → index 3 (2-back from baseline)
                  TARGET_INDEX=$((1 + STEPS))

                  echo "ℹ️  No current SHA; using newest deployment (index 1) as baseline"

                  # Bounds check
                  if [ "$TARGET_INDEX" -le "$SHA_COUNT" ]; then
                    HISTORY_SHA=$(echo "$HISTORY_SHAS" | tac | sed -n "${TARGET_INDEX}p")
                    echo "ℹ️  Baseline at position 1, target at position ${TARGET_INDEX}"
                  else
                    echo "❌ ERROR: Not enough SHA deployments in history to rollback ${STEPS} step(s)"
                    echo "   Need at least $((STEPS + 1)) entries, found ${SHA_COUNT}"
                    exit 1
                  fi
                fi

                if [ -n "$HISTORY_SHA" ]; then
                  FINAL_SHA="$HISTORY_SHA"
                  echo "✅ Rollback target from local history: ${FINAL_SHA}"
                else
                  echo "❌ ERROR: Could not determine rollback target from local history"
                  echo "   Current SHA: ${CURRENT_SHA}"
                  echo "   Steps: ${STEPS}"
                  echo "   SHA-based entries in history: ${SHA_COUNT}"
                  exit 1
                fi
              else
                echo "❌ ERROR: No deployment history available"
                echo "   GitHub Deployments API: insufficient data"
                echo "   Local history file not found: ${HISTORY_FILE}"
                echo "   Cannot calculate rollback target for steps=${STEPS}"
                exit 1
              fi
            fi

            FINAL_IMAGE_REF="${IMAGE_NAME}:${FINAL_SHA}"
          fi

          # Validate final SHA or image
          if [ -z "$FINAL_SHA" ] && [ -z "$FINAL_IMAGE_REF" ] && [ "$ACTION" != "restart" ]; then
            echo "❌ ERROR: Could not determine target SHA or image for ${ACTION}"
            exit 1
          fi

          # Output results
          echo "final_sha=${FINAL_SHA}" >> $GITHUB_OUTPUT
          echo "final_image_ref=${FINAL_IMAGE_REF}" >> $GITHUB_OUTPUT

          echo "✅ Target determined: SHA=${FINAL_SHA:-'(from image)'} Image=${FINAL_IMAGE_REF:-'N/A'}"

      # STEP 5.5: Verify Coverage Gate Passed
      # COVERAGE GATE: Block redeploy/rollback if coverage check missing or failed
      # Queries GitHub Checks API for "test-coverage" check run (job name) on the target SHA
      # Skips for restart operations (no new code deployment)
      - name: Verify Coverage Gate
        id: verify_coverage
        if: |
          steps.validate.outputs.should_run == 'true' &&
          (steps.validate.outputs.action == 'redeploy' || steps.validate.outputs.action == 'rollback') &&
          steps.determine_sha.outputs.final_sha != ''
        uses: actions/github-script@v7
        with:
          script: |
            const targetSha = '${{ steps.determine_sha.outputs.final_sha }}';
            const action = '${{ steps.validate.outputs.action }}';
            const originalRef = '${{ steps.resolve_sha.outputs.original_ref }}';
            const isResolved = originalRef && originalRef !== targetSha;
            const requiredCheckName = 'test-coverage';  // Must match job name in test-coverage.yml

            if (isResolved) {
              core.info(`🔍 Checking coverage gate for ${action} to ${originalRef} → ${targetSha}`);
            } else {
              core.info(`🔍 Checking coverage gate for ${action} to SHA: ${targetSha}`);
            }

            // Query ALL check runs on this SHA (do not use check_name filter to avoid API quirks)
            const { data: allChecks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: targetSha
            });

            core.info(`Found ${allChecks.total_count} total check runs for SHA ${targetSha.substring(0, 7)}`);

            // Filter to find the coverage check by exact name match
            const coverageChecks = allChecks.check_runs.filter(check => check.name === requiredCheckName);

            core.info(`Found ${coverageChecks.length} check runs with name="${requiredCheckName}"`);

            // Verify coverage check exists
            if (coverageChecks.length === 0) {
              const errorMsg = `❌ COVERAGE GATE FAILED: No "${requiredCheckName}" check found for SHA ${targetSha.substring(0, 7)}.\n\nCoverage tests must run before ${action}.`;
              core.setOutput('error_message', errorMsg);
              core.setOutput('target_sha', targetSha);
              core.setFailed(errorMsg);
              return { passed: false };
            }

            // Sort by completed_at (or started_at if not completed) descending to get most recent
            const sortedChecks = coverageChecks.sort((a, b) => {
              const timeA = new Date(a.completed_at || a.started_at || 0);
              const timeB = new Date(b.completed_at || b.started_at || 0);
              return timeB - timeA; // Newest first
            });

            // Get the most recent check run
            const coverageCheck = sortedChecks[0];
            core.info(`Using check run ID ${coverageCheck.id} (${coverageCheck.completed_at || coverageCheck.started_at})`);
            core.info(`Check status: ${coverageCheck.status}, conclusion: ${coverageCheck.conclusion}`);

            // Verify check is completed
            if (coverageCheck.status !== 'completed') {
              const statusMsg = coverageCheck.status === 'in_progress' ? 'still running' : coverageCheck.status;
              const errorMsg = `❌ COVERAGE GATE FAILED: Coverage check is ${statusMsg}. Wait for coverage tests to complete.\n\nCheck: ${coverageCheck.html_url}`;
              core.setOutput('error_message', errorMsg);
              core.setOutput('target_sha', targetSha);
              core.setOutput('check_url', coverageCheck.html_url);
              core.setFailed(errorMsg);
              return { passed: false };
            }

            // Verify check passed
            if (coverageCheck.conclusion !== 'success') {
              const errorMsg = `❌ COVERAGE GATE FAILED: Coverage check ${coverageCheck.conclusion}. Coverage must be ≥70% for ${action}.\n\nCheck: ${coverageCheck.html_url}`;
              core.setOutput('error_message', errorMsg);
              core.setOutput('target_sha', targetSha);
              core.setOutput('check_url', coverageCheck.html_url);
              core.setFailed(errorMsg);
              return { passed: false };
            }

            // Extract coverage percentage from check run output (if available)
            let coveragePct = 'N/A';
            if (coverageCheck.output && coverageCheck.output.title) {
              // Parse coverage from title like "✅ Coverage 74.0% (≥70%)"
              const match = coverageCheck.output.title.match(/Coverage\s+([\d.]+)%/);
              if (match) {
                coveragePct = match[1];
                core.info(`Extracted coverage: ${coveragePct}%`);
              }
            }

            core.info(`✅ Coverage gate passed`);
            core.setOutput('coverage_check_url', coverageCheck.html_url);
            core.setOutput('coverage_pct', coveragePct);
            core.setOutput('target_sha', targetSha);

            return { passed: true, coveragePct };

      # STEP 5.6: Post coverage gate failure message
      # Runs if coverage gate check failed for redeploy/rollback
      # Provides immediate feedback to Ops Console about coverage requirements
      - name: Post Coverage Gate Failure
        if: always() && steps.verify_coverage.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const errorMessage = ${{ toJSON(steps.verify_coverage.outputs.error_message) }};
            const opsIssueNumber = Number(process.env.OPS_ISSUE_NUMBER);
            const isWorkflowDispatch = context.eventName === 'workflow_dispatch';
            const action = '${{ steps.validate.outputs.action }}';
            const targetSha = '${{ steps.verify_coverage.outputs.target_sha }}';
            const checkUrl = '${{ steps.verify_coverage.outputs.check_url }}';
            const coveragePct = '${{ steps.verify_coverage.outputs.coverage_pct }}' || 'N/A';

            let coverageInfo = '';
            if (coveragePct !== 'N/A') {
              coverageInfo = `\n**Current coverage:** ${coveragePct}% (threshold: 70%)\n`;
            }

            const comment = `### ❌ ${action.charAt(0).toUpperCase() + action.slice(1)} Blocked - Coverage Gate Failed

            **Error Details:**

            ${errorMessage || '❌ Coverage gate check failed - see workflow logs'}
            ${coverageInfo}
            ---

            #### 📊 Coverage Requirements

            Operations require:
            - ✅ Coverage tests must run on target SHA: \`${targetSha.substring(0, 7)}\`
            - ✅ Coverage must be ≥70%
            - ✅ All tests must pass
            - ✅ Check "test-coverage" must complete with success

            #### 🔧 How to Fix

            1. Ensure the target SHA has coverage tests run
            2. Verify tests pass with ≥70% coverage
            3. Wait for "test-coverage" check to complete successfully
            4. Retry the operation

            ${checkUrl ? `**Check run:** ${checkUrl}` : ''}

            ---
            📋 **View Ops Workflow:** [Run #${context.runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            `;

            // For workflow_dispatch, post to ops console
            // For issue_comment, post to the same issue (which should be ops console)
            const targetIssue = isWorkflowDispatch ? opsIssueNumber : context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetIssue,
              body: comment
            });

      # STEP 6: Create GitHub Deployment record
      # Creates a deployment tied to the target SHA for tracking
      - name: Create GitHub Deployment
        id: create_deployment
        if: steps.validate.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const environment = '${{ steps.validate.outputs.environment }}';
            const action = '${{ steps.validate.outputs.action }}';
            const finalSha = '${{ steps.determine_sha.outputs.final_sha }}';
            const currentSha = '${{ steps.determine_current.outputs.current_sha }}';
            const requester = '${{ steps.validate.outputs.requester }}';
            const currentImage = '${{ steps.determine_current.outputs.current_image }}';

            // Always use SHA format (never branch name like "main")
            // Priority: finalSha (target) > currentSha (running) > context.sha (workflow trigger)
            const ref = finalSha || currentSha || context.sha;
            const shortSha = ref.substring(0, 7);

            // Find which branch/PR this SHA belongs to (enables GitHub UI to show PR #)
            let branchName = 'unknown';
            let prNumber = null;

            try {
              // Strategy 1: Find associated PR (best source, gives both branch and PR #)
              const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: ref
              });

              if (prs.length > 0) {
                prNumber = prs[0].number;
                branchName = prs[0].head.ref;
                core.info(`   SHA ${shortSha} from PR #${prNumber} (${branchName})`);
              } else {
                // Strategy 2: Check if SHA is HEAD of any branch
                const { data: branches } = await github.rest.repos.listBranchesForHeadCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  commit_sha: ref
                });

                if (branches.length > 0) {
                  const mainBranch = branches.find(b => b.name === 'main' || b.name === 'master');
                  branchName = mainBranch ? mainBranch.name : branches[0].name;
                  core.info(`   SHA ${shortSha} is HEAD of branch: ${branchName}`);
                } else {
                  // Strategy 3: Check existing deployment history
                  core.info(`   SHA ${shortSha} not found as branch HEAD, checking deployment history...`);

                  const { data: existingDeployments } = await github.rest.repos.listDeployments({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    sha: ref,
                    per_page: 10
                  });

                  for (const dep of existingDeployments) {
                    if (dep.payload?.pr_branch) {
                      branchName = dep.payload.pr_branch;
                      prNumber = dep.payload.pr_number ? Number(dep.payload.pr_number) : null;
                      core.info(`   Found from previous deployment: ${branchName}${prNumber ? ` (PR #${prNumber})` : ''}`);
                      break;
                    }
                  }

                  if (branchName === 'unknown') {
                    branchName = context.ref.replace(/^refs\/heads\//, '').replace(/^refs\/tags\//, '');
                    core.info(`   Using workflow branch as fallback: ${branchName}`);
                  }
                }
              }
            } catch (error) {
              core.warning(`Failed to lookup branch for ${shortSha}: ${error.message}`);
              branchName = context.ref.replace(/^refs\/heads\//, '').replace(/^refs\/tags\//, '');
            }

            core.info(`📝 Creating deployment record for ${environment} (${action})`);
            core.info(`   Ref: ${ref}`);
            core.info(`   Branch: ${branchName}`);
            core.info(`   Action: ${action}`);
            core.info(`   Requester: ${requester}`);

            // Cache branch/PR info for reuse in Update Deployment Status step
            core.setOutput('branch_name', branchName);
            core.setOutput('pr_number', prNumber || '');
            core.setOutput('deployment_sha', ref);

            const { data: deployment } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              task: `${branchName}:${action}`,  // Shows branch + action in UI (e.g., "feature_1:restart")
              environment,
              auto_merge: false,
              required_contexts: [],  // Bypass status checks for ops deployments
              description: `Ops ${action} to ${environment} by ${requester} (${branchName}@${shortSha})`,
              payload: {
                action,
                pr_number: prNumber ? String(prNumber) : null,
                pr_branch: branchName,
                target_sha: finalSha || '',
                current_image: currentImage || '',
                triggered_by: requester,
                ops_workflow_run: context.runId
              }
            });

            core.setOutput('deployment_id', deployment.id);
            core.info(`✅ Deployment created: ID ${deployment.id}`);

            // Mark as in-progress
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.id,
              state: 'in_progress',
              environment,
              description: `Ops ${action} in progress for ${environment} (${branchName}@${shortSha})`,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      # STEP 7: Execute ops operation (VM Mode)
      # Performs restart, redeploy, or rollback based on action
      - name: Execute Ops Operation
        id: execute_ops
        if: steps.validate.outputs.should_run == 'true'
        env:
          ACTION: ${{ steps.validate.outputs.action }}
          ENVIRONMENT: ${{ steps.validate.outputs.environment }}
          PORT: ${{ steps.validate.outputs.port }}
          FINAL_SHA: ${{ steps.determine_sha.outputs.final_sha }}
          API_KEY: ${{ secrets.API_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          set -e

          echo "🚀 Executing ops operation: ${ACTION} on ${ENVIRONMENT}"
          echo "📁 Service Directory: ${SERVICE_DIR}"
          echo "🔌 Port: ${PORT}"

          HEALTH_STATUS="unknown"

          # Ensure service directory exists
          if [ ! -d "${SERVICE_DIR}" ]; then
            echo "📁 Creating service directory: ${SERVICE_DIR}"
            mkdir -p ${SERVICE_DIR}
            cd ${SERVICE_DIR}
            git clone ${{ github.server_url }}/${{ github.repository }} .
          fi

          cd ${SERVICE_DIR}

          # ============================================================
          # RESTART OPERATION
          # ============================================================
          if [ "$ACTION" = "restart" ]; then
            echo "♻️  Performing restart operation..."

            # Check if service is running
            if ! pgrep -f "uvicorn app.main" > /dev/null; then
              echo "⚠️  WARNING: Service is not running. Will start it instead."
            else
              echo "🛑 Stopping service..."
              pkill -f "uvicorn app.main" || true
              sleep 2
            fi

            # Get current SHA
            CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")
            echo "📍 Current SHA: ${CURRENT_SHA}"

            # Install dependencies if needed
            if [ -f requirements.txt ]; then
              echo "📦 Checking dependencies..."
              python3 -m venv venv || true
              source venv/bin/activate
              pip install -q -r requirements.txt
            fi

            # Start service
            echo "▶️  Starting service on port ${PORT}..."
            export COMMIT_SHA="${CURRENT_SHA}"
            export ENVIRONMENT="${ENVIRONMENT}"
            export DEPLOYMENT_ID="${{ github.run_id }}"
            export PORT="${PORT}"
            export API_KEY="${API_KEY}"
            export DB_HOST="${DB_HOST}"

            nohup venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port ${PORT} \
              > app.log 2>&1 &

            echo "service_pid=$!" >> $GITHUB_OUTPUT

            # Wait for startup
            echo "⏳ Waiting for service to start..."
            sleep 5

          # ============================================================
          # REDEPLOY OPERATION
          # ============================================================
          elif [ "$ACTION" = "redeploy" ]; then
            echo "🔄 Performing redeploy operation..."

            if [ -z "$FINAL_SHA" ]; then
              echo "❌ ERROR: Cannot redeploy without target SHA"
              exit 1
            fi

            echo "🎯 Target SHA: ${FINAL_SHA}"

            # Stop existing service
            echo "🛑 Stopping existing service..."
            pkill -f "uvicorn app.main" || true
            sleep 2

            # Fetch and checkout target commit
            echo "📥 Fetching repository updates..."
            git fetch origin
            echo "🔀 Checking out commit: ${FINAL_SHA}"
            git checkout ${FINAL_SHA}

            # Install dependencies
            if [ -f requirements.txt ]; then
              echo "📦 Installing dependencies..."
              python3 -m venv venv || true
              source venv/bin/activate
              pip install -q -r requirements.txt
            fi

            # Start service
            echo "▶️  Starting service on port ${PORT}..."
            export COMMIT_SHA="${FINAL_SHA}"
            export ENVIRONMENT="${ENVIRONMENT}"
            export DEPLOYMENT_ID="${{ github.run_id }}"
            export PORT="${PORT}"
            export API_KEY="${API_KEY}"
            export DB_HOST="${DB_HOST}"

            nohup venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port ${PORT} \
              > app.log 2>&1 &

            echo "service_pid=$!" >> $GITHUB_OUTPUT

            # Wait for startup
            echo "⏳ Waiting for service to start..."
            sleep 5

          # ============================================================
          # ROLLBACK OPERATION
          # ============================================================
          elif [ "$ACTION" = "rollback" ]; then
            echo "⏪ Performing rollback operation..."

            if [ -z "$FINAL_SHA" ]; then
              echo "❌ ERROR: Cannot rollback without target SHA"
              exit 1
            fi

            echo "🎯 Rollback target SHA: ${FINAL_SHA}"

            # Verify commit exists
            if ! git cat-file -e ${FINAL_SHA} 2>/dev/null; then
              echo "❌ ERROR: Rollback commit does not exist: ${FINAL_SHA}"
              echo "Fetching all refs to ensure commit is available..."
              git fetch origin
              if ! git cat-file -e ${FINAL_SHA} 2>/dev/null; then
                echo "❌ ERROR: Commit still not found after fetch: ${FINAL_SHA}"
                exit 1
              fi
            fi
            echo "✅ Rollback commit verified: ${FINAL_SHA}"

            # Stop existing service
            echo "🛑 Stopping existing service..."
            pkill -f "uvicorn app.main" || true
            sleep 2

            # Checkout rollback target
            echo "🔀 Checking out rollback target: ${FINAL_SHA}"
            git checkout ${FINAL_SHA}

            # Install dependencies
            if [ -f requirements.txt ]; then
              echo "📦 Installing dependencies..."
              python3 -m venv venv || true
              source venv/bin/activate
              pip install -q -r requirements.txt
            fi

            # Start service
            echo "▶️  Starting service on port ${PORT}..."
            export COMMIT_SHA="${FINAL_SHA}"
            export ENVIRONMENT="${ENVIRONMENT}"
            export DEPLOYMENT_ID="${{ github.run_id }}"
            export PORT="${PORT}"
            export API_KEY="${API_KEY}"
            export DB_HOST="${DB_HOST}"

            nohup venv/bin/uvicorn app.main:app \
              --host 0.0.0.0 \
              --port ${PORT} \
              > app.log 2>&1 &

            echo "service_pid=$!" >> $GITHUB_OUTPUT

            # Wait for startup
            echo "⏳ Waiting for service to start..."
            sleep 5
          fi

          # ============================================================
          # HEALTH CHECK (common for all operations)
          # ============================================================
          echo "🏥 Checking service health..."

          # Verify HTTP endpoint is responding
          MAX_RETRIES=${HEALTH_CHECK_MAX_RETRIES}
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -f -s -o /dev/null http://localhost:${PORT}/ 2>/dev/null; then
              HEALTH_STATUS="healthy"
              echo "✅ Service is healthy and responding"
              break
            fi
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - waiting for service..."
            sleep ${HEALTH_CHECK_RETRY_SLEEP}
          done

          if [ "$HEALTH_STATUS" != "healthy" ]; then
            echo "❌ Service health check failed"
            echo "📋 Last 50 lines of app.log:"
            tail -50 app.log || true
            HEALTH_STATUS="failed"
            echo "health_status=${HEALTH_STATUS}" >> $GITHUB_OUTPUT
            exit 1
          fi

          # ============================================================
          # RECORD TO LOCAL HISTORY (only on successful operations)
          # ============================================================
          HISTORY_FILE="/tmp/myapp-${ENVIRONMENT}.history"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Get current SHA for history
          CURRENT_SHA=$(git rev-parse HEAD 2>/dev/null || echo "")

          # Record all ops actions to history (restart, redeploy, rollback)
          if [ -n "$CURRENT_SHA" ]; then
            echo "📝 Recording to local history: ${HISTORY_FILE}"
            echo "${TIMESTAMP} action=${ACTION} sha=${CURRENT_SHA} run_id=${{ github.run_id }}" >> ${HISTORY_FILE}
          fi

          # Set outputs
          echo "health_status=${HEALTH_STATUS}" >> $GITHUB_OUTPUT

          echo "✅ Ops operation completed successfully"
          echo "🏥 Health: ${HEALTH_STATUS}"
          echo "📍 SHA: ${CURRENT_SHA}"

      # STEP 8: Post ops status comment
      # Posts result to Ops Console issue
      - name: Post Ops Status Comment
        if: always() && steps.validate.outputs.should_run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const action = '${{ steps.validate.outputs.action }}';
            const environment = '${{ steps.validate.outputs.environment }}';
            const port = '${{ steps.validate.outputs.port }}';
            const requester = '${{ steps.validate.outputs.requester }}';
            const finalSha = '${{ steps.determine_sha.outputs.final_sha }}';
            const targetSha = '${{ steps.validate.outputs.target_sha }}';
            const steps_back = '${{ steps.validate.outputs.steps }}';
            const currentSha = '${{ steps.determine_current.outputs.current_sha }}';
            const usedApi = '${{ steps.compute_rollback_api.outputs.used_api }}';
            const jobStatus = '${{ job.status }}';
            const healthStatus = '${{ steps.execute_ops.outputs.health_status }}';

            const statusEmoji = jobStatus === 'success' ? '✅' : '❌';
            const statusText = jobStatus === 'success' ? 'SUCCEEDED' : 'FAILED';

            // Build target description
            let targetDesc = '';
            if (action === 'restart') {
              targetDesc = 'Current version';
            } else if (action === 'redeploy') {
              targetDesc = targetSha ? `SHA: \`${targetSha}\`` : `Current SHA: \`${finalSha}\``;
            } else if (action === 'rollback') {
              if (targetSha) {
                targetDesc = `SHA: \`${targetSha}\``;
              } else {
                const source = usedApi === 'true' ? 'GitHub Deployments API' : 'Local history fallback';
                targetDesc = `${steps_back} step(s) back from \`${currentSha?.substring(0, 7) || 'current'}\` (via ${source})`;
              }
            }

            // Map health status to display text
            const healthMap = {
              'healthy': '✅ Healthy (verified)',
              'running_unverified': '⚠️ Running (unverified)',
              'failed': '❌ Failed',
              '': jobStatus === 'success' ? '✅ Running' : '❌ Failed'
            };
            const healthDisplay = healthMap[healthStatus] || healthStatus;

            let comment = `### ${statusEmoji} Ops ${action.toUpperCase()}: ${statusText}

            #### 📋 Operation Details
            | Field | Value |
            |-------|-------|
            | **Action** | \`${action}\` |
            | **Environment** | \`${environment}\` |
            | **Status** | ${statusText} |
            | **Requested By** | @${requester} |
            | **Target** | ${targetDesc} |
            | **Result SHA** | \`${finalSha || 'N/A'}\` |
            | **Port** | \`${port}\` |
            | **Service Status** | ${healthDisplay} |
            `;

            if (jobStatus === 'success') {
              comment += `\n---\n#### 🌐 Access Information\n`;
              comment += `**URL:** http://localhost:${port}/\n`;
              comment += `**Workflow Run:** [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            } else {
              comment += `\n---\n#### ⚠️ Action Required\n`;
              comment += `Operation failed. Check workflow logs for detailed error information.\n\n`;
              comment += `**Workflow Run:** [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n`;
            }

            const opsIssueNumber = Number(process.env.OPS_ISSUE_NUMBER);
            const isWorkflowDispatch = context.eventName === 'workflow_dispatch';

            // Post to ops console issue
            const targetIssue = isWorkflowDispatch ? opsIssueNumber : context.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: targetIssue,
              body: comment
            });

      # STEP 9: Update GitHub Deployment Status
      # Updates the deployment record with final status
      - name: Update Deployment Status
        if: always() && steps.create_deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = Number('${{ steps.create_deployment.outputs.deployment_id }}');
            const environment = '${{ steps.validate.outputs.environment }}';
            const action = '${{ steps.validate.outputs.action }}';
            const finalSha = '${{ steps.determine_sha.outputs.final_sha }}';
            const currentSha = '${{ steps.determine_current.outputs.current_sha }}';
            const jobStatus = '${{ job.status }}';

            // Reuse cached branch/PR info from Create Deployment step (avoids duplicate API calls)
            const branchName = '${{ steps.create_deployment.outputs.branch_name }}' || 'unknown';
            const deploymentSha = '${{ steps.create_deployment.outputs.deployment_sha }}';
            const shortSha = deploymentSha.substring(0, 7);

            core.info(`Using cached branch info: ${branchName} for ${shortSha}`);

            // Sanitizer to remove 4-byte Unicode characters (emoji) that GitHub API rejects
            const sanitize = (s) => Array.from(s)
              .filter(ch => ch.codePointAt(0) <= 0xFFFF)
              .join('');

            let state;
            let description;

            if (jobStatus === 'success') {
              state = 'success';
              description = `Ops ${action} completed for ${environment} (${branchName}@${shortSha})`;
            } else if (jobStatus === 'failure') {
              state = 'failure';
              description = `Ops ${action} failed for ${environment} (${branchName}@${shortSha})`;
            } else {
              state = 'error';
              description = `Ops ${action} ended with status: ${jobStatus}`;
            }

            // Sanitize description
            description = sanitize(description);

            const port = environment === 'staging' ? process.env.STAGING_PORT : process.env.PROD_PORT;
            const environmentUrl = `http://localhost:${port}/`;
            const logUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deploymentId,
              state,
              environment,
              description,
              environment_url: environmentUrl,
              log_url: logUrl,
              auto_inactive: false  // Don't auto-inactive for ops operations
            });

            core.info(`Deployment status updated: ${state}`);
