name: Post Comment to Issue or PR
description: Posts a comment to an issue or pull request

inputs:
  issue-number:
    description: 'Issue or PR number to comment on'
    required: true
  comment-body:
    description: 'Full markdown comment body to post'
    required: true
  github-token:
    description: 'GitHub token for API access'
    required: false
    default: ${{ github.token }}

outputs:
  comment-id:
    description: 'ID of the created comment'
    value: ${{ steps.post.outputs.comment_id }}

runs:
  using: composite
  steps:
    - name: Post comment
      id: post
      uses: actions/github-script@v7
      env:
        COMMENT_BODY: ${{ inputs.comment-body }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const issueNumber = Number('${{ inputs.issue-number }}');
          const commentBody = process.env.COMMENT_BODY;

          const { data: comment } = await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issueNumber,
            body: commentBody
          });

          core.setOutput('comment_id', comment.id);
          core.info(`✅ Posted comment ID ${comment.id} to issue #${issueNumber}`);
